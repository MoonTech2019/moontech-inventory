<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;font-family:'Noto Sans KR','Segoe UI',sans-serif;color:#e8eaf0}
.hdr{background:linear-gradient(180deg,#1a0000,#0f1117);border-bottom:2px solid #cc0000;padding:14px 16px 12px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo-wrap{display:flex;align-items:center;gap:0}
.hdr-btns{display:flex;gap:8px}
.hbtn{flex:1;border-radius:10px;padding:11px 0;font-size:13px;font-weight:600;cursor:pointer;border:none}
.card{background:#1a1d2e;border-radius:16px;border:1px solid #2a2d3e;padding:18px;margin-bottom:16px}
.inp{width:100%;background:#0d1020;border:1px solid #2a2d3e;border-radius:8px;padding:9px 12px;color:#e8eaf0;font-size:13px;outline:none}
.inp:focus{border-color:#4f8ef7}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cell{background:#0f1117;border-radius:10px;padding:11px 13px}
.lbl{font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.5px;margin-bottom:5px}
.einp{width:100%;background:#0d1020;border:1px solid #4f8ef7;border-radius:6px;padding:5px 8px;color:#e8eaf0;font-size:13px;outline:none;box-sizing:border-box}
#detail{position:fixed;inset:0;background:#0f1117;z-index:100;overflow-y:auto;display:none}
#add-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
#add-box{background:#1a1d2e;border-radius:20px;border:1px solid #2a2d3e;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
</style>
</head>

function gasGet(cb) {
  fetch(GAS, {method:'GET', redirect:'follow'})
    .then(function(r){ return r.json(); })
    .then(function(j){ cb(null, j.data||[]); })
    .catch(function(e){ cb(e); });
}

function gasPost(body, cb) {
  fetch(GAS, {
    method:'POST',
    redirect:'follow',
    body:JSON.stringify(body)
  })
    .then(function(r){ return r.json(); })
    .then(function(j){ if(cb) cb(null, j); })
    .catch(function(e){ if(cb) cb(e); });
}

function compressImage(base64, maxSize, quality, callback) {
  var img = new Image();
  img.onload = function() {
    var w = img.width, h = img.height;
    if(w > maxSize || h > maxSize) {
      if(w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
      else { w = Math.round(w * maxSize / h); h = maxSize; }
    }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = function() { callback(base64); };
  img.src = base64;
}

      method:'POST',
      redirect:'follow',
      body:JSON.stringify({action:'uploadPhoto', base64:compressed, mimeType:'image/jpeg', fileName:fileName})
    })
      .then(function(r){ return r.json(); })
      .then(function(j){
        if(j.success) cb(null, j.url);
        else cb(new Error(j.error||'업로드 실패'));
      })
      .catch(function(e){ cb(e); });
  });
}

function setBadge(s) {
  var el = $('badge'); if(!el) return;
  if(s === 'idle') { el.style.display = 'none'; return; }
  el.style.display = 'inline-block';
  if(s === 'ok') { el.style.background = '#14532d'; el.style.color = '#4ade80'; el.textContent = '✓ 동기화됨'; }
  else if(s === 'err') { el.style.background = '#7f1d1d'; el.style.color = '#f87171'; el.textContent = '⚠ 연결 오류'; }
  else { el.style.background = '#1e3a5f'; el.style.color = '#60a5fa'; el.textContent = '⟳ 동기화 중...'; }
}

function extractPhotoUrl(val) {
  if(!val) return null;
  var s = String(val);
  if(s.indexOf('http') === 0) return s;
  var i = s.indexOf('https://');
  if(i >= 0) {
    var j = s.indexOf('"', i);
    return j > 0 ? s.substring(i, j) : s.substring(i);
  }
  return null;
}

function fixPhone(v) {
  var s = String(v || '').trim();
  if(!s) return '';
  if(s.length >= 9 && s.length <= 11 && s.charAt(0) !== '0') s = '0' + s;
  return s;
}

function loadData(silent) {
  setBadge('ing');
  gasGet(function(err, data) {
    if(err) { setBadge('err'); return; }
    items = [];
    for(var k = 0; k < data.length; k++) {
      var r = data[k];
      items.push({
        id: String(r.id || ''),
        name: String(r.name || ''),
        spec: String(r.spec || ''),
        manufacturer: String(r.manufacturer || ''),
        supplier: String(r.supplier || ''),
        note: String(r.note || ''),
        phone: fixPhone(r.phone),
        mobile: fixPhone(r.mobile),
        purchasePrice: toNum(r.purchasePrice),
        supplyPrice: toNum(r.supplyPrice),
        photo: extractPhotoUrl(r.photo)
      });
    }
    $('total-cnt').textContent = items.length;
    if(results) {
      for(var m = 0; m < results.length; m++) {
        for(var n = 0; n < items.length; n++) {
          if(items[n].id === results[m].id) { results[m] = items[n]; break; }
        }
      }
      renderTable();
    }
    setBadge('ok');
  });
}

function doSearch() {
  var keys = ['id','name','spec','manufacturer','supplier'];
  var vals = {};
  for(var i = 0; i < keys.length; i++) {
    var el = $('s-' + keys[i]);
    vals[keys[i]] = el ? el.value.trim().toLowerCase() : '';
  }
  results = [];
  for(var j = 0; j < items.length; j++) {
    var item = items[j], ok2 = true;
    for(var ki = 0; ki < keys.length; ki++) {
      var q = vals[keys[ki]];
      if(q && item[keys[ki]].toLowerCase().indexOf(q) < 0) { ok2 = false; break; }
    }
    if(ok2) results.push(item);
  }
  $('search-cnt').innerHTML = '· 검색 <span style="color:#4f8ef7;font-weight:700">' + results.length + '</span>건';
  curItem = null;
  renderTable();
}

function startRow(id) { editRowId=id; editRowData=JSON.parse(JSON.stringify(items.filter(function(i){return i.id===id;})[0]||{})); renderTable(); }
function cancelRow() { editRowId=null; editRowData={}; renderTable(); }
function saveRow(id) {
  var updated = JSON.parse(JSON.stringify(editRowData));
  updated.purchasePrice = toNum(updated.purchasePrice);
  updated.supplyPrice = toNum(updated.supplyPrice);
  for(var i=0;i<items.length;i++) { if(items[i].id===id){items[i]=updated;break;} }
  if(results) { for(var j=0;j<results.length;j++) { if(results[j].id===id){results[j]=updated;break;} } }
  if(curItem&&curItem.id===id) curItem=updated;
  editRowId=null; editRowData={};
  renderTable(); setBadge('ing');
  gasPost({action:'update',item:updated},function(){setBadge('ok');});
}

function doDeleteById(id) {
  if(!confirm('이 물품을 삭제하시겠습니까?')) return;
  var newItems=[]; for(var i=0;i<items.length;i++) { if(items[i].id!==id) newItems.push(items[i]); } items=newItems;
  if(results) { var nr=[]; for(var j=0;j<results.length;j++) { if(results[j].id!==id) nr.push(results[j]); } results=nr; }
  if(curItem&&curItem.id===id) closeDetail();
  $('total-cnt').textContent=items.length;
  renderTable(); setBadge('ing');
  gasPost({action:'delete',id:id},function(){setBadge('ok');});
}
function doDelete() { if(curItem) doDeleteById(curItem.id); }

function submitAdd() {
  var id=($('ni-id').value||'').trim(), name=($('ni-name').value||'').trim();
  if(!id||!name) { alert('물품번호와 품명은 필수입니다.'); return; }
  if(newPhoto==='uploading') { alert('사진 업로드 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  var ph=($('ni-phone').value||'').trim(), mb=($('ni-mobile').value||'').trim();
  var item={
    id:id, name:name, spec:$('ni-spec').value, manufacturer:$('ni-manufacturer').value,
    supplier:$('ni-supplier').value, note:$('ni-note').value,
    purchasePrice:toNum($('ni-purchase').value), supplyPrice:toNum($('ni-supply').value),
    phone:ph?' '+ph:'', mobile:mb?' '+mb:'', photo:newPhoto||''
  };
  items.push(item); $('total-cnt').textContent=items.length;
  closeAdd(); setBadge('ing');
  gasPost({action:'add',item:item},function(){setBadge('ok');});
}

function doExport(searchOnly) {
  var data=(searchOnly&&results)?results:items;
  var rows=[];
  for(var i=0;i<data.length;i++) {
    var it=data[i];
    rows.push({
      '물품번호':it.id,'품명':it.name,'규격':it.spec,
      '입고단가(원)':it.purchasePrice,'납품단가(원)':it.supplyPrice,
      '마진율(%)':it.purchasePrice>0?Number(((it.supplyPrice-it.purchasePrice)/it.supplyPrice*100).toFixed(1)):'',
      '제작회사':it.manufacturer,'납품처':it.supplier,
      '회사번호':it.phone,'휴대폰':it.mobile,'비고':it.note,'사진링크':it.photo||''
    });
  }
  var ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:20},{wch:20},{wch:12},{wch:12},{wch:10},{wch:16},{wch:16},{wch:14},{wch:14},{wch:20},{wch:40}];
  var wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'물품목록');
  XLSX.writeFile(wb,'물품목록_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.xlsx');
}

loadData(false);
setInterval(function(){loadData(true);},30000);
</script>
