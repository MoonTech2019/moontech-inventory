<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>MoonTech 물품관리</title>
<meta name="theme-color" content="#cc0000"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="icon" href="icon.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;font-family:'Noto Sans KR','Segoe UI',sans-serif;color:#e8eaf0}
.hdr{background:linear-gradient(180deg,#1a0000,#0f1117);border-bottom:2px solid #cc0000;padding:14px 16px 12px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo-wrap{display:flex;align-items:flex-end;gap:0}
.hdr-btns{display:flex;gap:8px}
.hbtn{flex:1;border-radius:10px;padding:11px 0;font-size:13px;font-weight:600;cursor:pointer;border:none}
.card{background:#1a1d2e;border-radius:16px;border:1px solid #2a2d3e;padding:18px;margin-bottom:16px}
.inp{width:100%;background:#0d1020;border:1px solid #2a2d3e;border-radius:8px;padding:9px 12px;color:#e8eaf0;font-size:13px;outline:none}
.inp:focus{border-color:#4f8ef7}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cell{background:#0f1117;border-radius:10px;padding:11px 13px}
.lbl{font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.5px;margin-bottom:5px}
.einp{width:100%;background:#0d1020;border:1px solid #4f8ef7;border-radius:6px;padding:5px 8px;color:#e8eaf0;font-size:13px;outline:none;box-sizing:border-box}
#detail{position:fixed;inset:0;background:#0f1117;z-index:100;overflow-y:auto;display:none}
#add-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
#add-box{background:#1a1d2e;border-radius:20px;border:1px solid #2a2d3e;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
</style>
</head>

        <div><div class="lbl">납품단가 (원)</div><input id="ni-supply" type="number" class="inp"></div>
        <div><div class="lbl">📞 회사번호</div><input id="ni-phone" type="tel" class="inp"></div>

        <button onclick="submitAdd()" style="flex:1;background:linear-gradient(135deg,#4f8ef7,#6366f1);border:none;border-radius:8px;padding:11px 0;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Google Sheets에 등록</button>
        <button onclick="closeAdd()" style="background:transparent;border:1px solid #2a2d3e;border-radius:8px;padding:11px 16px;color:#9ca3af;font-size:13px;cursor:pointer">취소</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var GAS = 'https://script.google.com/macros/s/AKfycbyOU1fDAbSvYbBmW_Ok_Xbc2YfJq8qfouN0mi5iTATB1VLMVcHzr-IMlXiYSYPU8Nlz/exec';
var $ = function(id) { return document.getElementById(id); };
var fmt = function(n) { return Number(n||0).toLocaleString('ko-KR'); };
var toNum = function(v) { return isNaN(Number(v)) ? 0 : Number(v); };

var items = [], results = null, curItem = null, detEditing = false;
var editRowId = null, editRowData = {}, newPhoto = null;

function gasGet(cb) {
  fetch(GAS + '?t=' + Date.now(), {method:'GET', redirect:'follow'})
    .then(function(r){ return r.json(); })
    .then(function(j){ cb(null, j.data||[]); })
    .catch(function(e){ cb(e); });
}

function gasPost(body, cb) {
  fetch(GAS, {
    method:'POST',
    redirect:'follow',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body)
  })
    .then(function(r){ return r.json(); })
    .then(function(j){ if(cb) cb(null, j); })
    .catch(function(e){ if(cb) cb(e); });
}

function compressImage(base64, maxSize, quality, callback) {
  var img = new Image();
  img.onload = function() {
    var w = img.width, h = img.height;
    if(w > maxSize || h > maxSize) {
      if(w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
      else { w = Math.round(w * maxSize / h); h = maxSize; }
    }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = function() { callback(base64); };
  img.src = base64;
}

function uploadPhoto(base64, mimeType, fileName, cb) {
  // 업로드 전 이미지 압축 (최대 800px, 품질 0.7)
  compressImage(base64, 800, 0.7, function(compressed) {
    fetch(GAS, {
      method:'POST',
      redirect:'follow',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'uploadPhoto', base64:compressed, mimeType:'image/jpeg', fileName:fileName})
    })
      .then(function(r){ return r.json(); })
      .then(function(j){
        if(j.success) cb(null, toDriveThumb(j.url));
        else cb(new Error(j.error||'업로드 실패'));
      })
      .catch(function(e){ cb(e); });
  });
}

function setBadge(s) {
  var el = $('badge'); if(!el) return;
  if(s === 'idle') { el.style.display = 'none'; return; }
  el.style.display = 'inline-block';
  if(s === 'ok') { el.style.background = '#14532d'; el.style.color = '#4ade80'; el.textContent = '✓ 동기화됨'; }
  else if(s === 'err') { el.style.background = '#7f1d1d'; el.style.color = '#f87171'; el.textContent = '⚠ 연결 오류'; }
  else { el.style.background = '#1e3a5f'; el.style.color = '#60a5fa'; el.textContent = '⟳ 동기화 중...'; }
}

function toDriveThumb(url) {
  // drive.google.com/uc?export=view&id=XXX -> 안정적인 썸네일 URL로 변환
  var m = url.match(/id=([a-zA-Z0-9_-]+)/);
  if(m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w1000';
  return url;
}

function extractPhotoUrl(val) {
  if(!val) return null;
  var s = String(val);
  var url = null;
  if(s.indexOf('http') === 0) url = s;
  else {
    var i = s.indexOf('https://');
    if(i >= 0) {
      var j = s.indexOf('"', i);
      url = j > 0 ? s.substring(i, j) : s.substring(i);
    }
  }
  if(!url) return null;
  if(url.indexOf('drive.google.com') >= 0 && url.indexOf('uc?export=view') >= 0) {
    return toDriveThumb(url);
  }
  return url;
}

function fixPhone(v) {
  var s = String(v || '').trim();
  if(!s) return '';
  if(s.length >= 9 && s.length <= 11 && s.charAt(0) !== '0') s = '0' + s;
  return s;
}

function loadData(silent) {
  setBadge('ing');
  gasGet(function(err, data) {
    if(err) { setBadge('err'); return; }
    items = [];
    for(var k = 0; k < data.length; k++) {
      var r = data[k];
      items.push({
        id: String(r.id || ''),
        name: String(r.name || ''),
        spec: String(r.spec || ''),
        manufacturer: String(r.manufacturer || ''),
        supplier: String(r.supplier || ''),
        note: String(r.note || ''),
        phone: fixPhone(r.phone),
        mobile: fixPhone(r.mobile),
        purchasePrice: toNum(r.purchasePrice),
        supplyPrice: toNum(r.supplyPrice),
        photo: extractPhotoUrl(r.photo)
      });
    }
    $('total-cnt').textContent = items.length;
    if(results) {
      for(var m = 0; m < results.length; m++) {
        for(var n = 0; n < items.length; n++) {
          if(items[n].id === results[m].id) { results[m] = items[n]; break; }
        }
      }
      renderTable();
    }
    setBadge('ok');
  });
}

function doSearch() {
  var keys = ['id','name','spec','manufacturer','supplier'];
  var vals = {};
  for(var i = 0; i < keys.length; i++) {
    var el = $('s-' + keys[i]);
    vals[keys[i]] = el ? el.value.trim().toLowerCase() : '';
  }
  results = [];
  for(var j = 0; j < items.length; j++) {
    var item = items[j], ok2 = true;
    for(var ki = 0; ki < keys.length; ki++) {
      var q = vals[keys[ki]];
      if(q && item[keys[ki]].toLowerCase().indexOf(q) < 0) { ok2 = false; break; }
    }
    if(ok2) results.push(item);
  }
  $('search-cnt').innerHTML = '· 검색 <span style="color:#4f8ef7;font-weight:700">' + results.length + '</span>건';
  curItem = null;
  renderTable();
}

function doReset() {
  var keys = ['id','name','spec','manufacturer','supplier'];
  for(var i = 0; i < keys.length; i++) { var el = $('s-' + keys[i]); if(el) el.value = ''; }
  results = null; curItem = null;
  $('search-cnt').textContent = '';
  $('result-area').innerHTML = '<div class="card" style="text-align:center;padding:48px 0"><div style="font-size:44px;margin-bottom:12px">🗂️</div><div style="font-size:14px;font-weight:600;color:#6b7280;margin-bottom:6px">검색 조건을 입력하고 찾기 버튼을 눌러주세요</div><div style="font-size:11px;color:#4b5563">데이터는 Google Sheets에 실시간 저장됩니다</div></div>';
}

function renderTable() {
  var area = $('result-area');
  if(!results) return;
  if(!results.length) {
    area.innerHTML = '<div class="card" style="text-align:center;padding:48px 0"><div style="font-size:32px;margin-bottom:10px">📭</div><div style="color:#4b5563">검색 결과가 없습니다</div></div>';
    return;
  }
  var wrap = document.createElement('div');
  wrap.style.cssText = 'background:#1a1d2e;border-radius:16px;border:1px solid #2a2d3e;overflow:hidden';
  var topBar = document.createElement('div');
  topBar.style.cssText = 'padding:12px 18px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between';
  topBar.innerHTML = '<span style="font-size:11px;color:#6b7280;font-weight:600">📋 항목을 클릭하면 상세 정보를 볼 수 있습니다</span>';
  var exBtn = document.createElement('button');
  exBtn.textContent = '📊 검색결과 엑셀';
  exBtn.style.cssText = 'background:#1a2e1a;border:1px solid #166534;border-radius:7px;padding:5px 12px;color:#4ade80;font-size:11px;font-weight:600;cursor:pointer';
  exBtn.onclick = function() { doExport(true); };
  topBar.appendChild(exBtn);
  wrap.appendChild(topBar);
  var scrollDiv = document.createElement('div'); scrollDiv.style.overflowX = 'auto';
  var table = document.createElement('table'); table.style.cssText = 'width:100%;border-collapse:collapse;font-size:13px';
  var thead = document.createElement('thead');
  var htr = document.createElement('tr'); htr.style.background = '#0f1117';
  var ths = ['사진','물품번호','품명','규격','납품처','입고단가','납품단가','제작회사','비고','관리'];
  for(var hi = 0; hi < ths.length; hi++) {
    var th = document.createElement('th');
    th.style.cssText = 'padding:10px 12px;color:#6b7280;font-weight:600;font-size:11px;white-space:nowrap;text-align:' + ((hi===5||hi===6)?'right':'left');
    th.textContent = ths[hi]; htr.appendChild(th);
  }
  thead.appendChild(htr); table.appendChild(thead);
  var tbody = document.createElement('tbody');
  for(var ri = 0; ri < results.length; ri++) {
    (function(item) {
      var isE = (editRowId === item.id);
      var tr = document.createElement('tr');
      tr.style.cssText = 'border-top:1px solid #1f2230;cursor:' + (isE?'default':'pointer') + ';background:' + (isE?'#1a2540':(curItem&&curItem.id===item.id?'#1e2640':'transparent'));
      if(!isE) {
        tr.onclick = function(e) {
          if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return;
          openDetail(item.id);
        };
        tr.onmouseenter = function() { if(!(curItem&&curItem.id===item.id)) tr.style.background='#1c1f2e'; };
        tr.onmouseleave = function() { tr.style.background=(curItem&&curItem.id===item.id)?'#1e2640':'transparent'; };
      }
      var td0 = document.createElement('td'); td0.style.cssText='padding:8px 12px;vertical-align:middle';
      if(item.photo) { var img=document.createElement('img'); img.src=item.photo; img.style.cssText='width:36px;height:36px;border-radius:6px;object-fit:cover;display:block'; td0.appendChild(img); }
      else { td0.innerHTML='<div style="width:36px;height:36px;border-radius:6px;background:#2a2d3e;display:flex;align-items:center;justify-content:center;font-size:15px">📷</div>'; }
      tr.appendChild(td0);
      function addTd(key, color, extra) {
        var td = document.createElement('td'); td.style.cssText='padding:8px 12px;vertical-align:middle'+(extra?';'+extra:'');
        if(isE) {
          var inp=document.createElement('input'); inp.type='text'; inp.value=editRowData[key]||'';
          inp.style.cssText='width:100%;min-width:60px;background:#0d1020;border:1px solid #4f8ef7;border-radius:5px;padding:3px 6px;color:'+(color||'#e8eaf0')+';font-size:12px;outline:none;box-sizing:border-box';
          (function(k){ inp.oninput=function(){editRowData[k]=inp.value;}; })(key);
          inp.onclick=function(e){e.stopPropagation();};
          td.appendChild(inp);
        } else { td.style.color=color||'#e8eaf0'; td.textContent=item[key]||''; }
        tr.appendChild(td);
      }
      function addNumTd(key, color) {
        var td=document.createElement('td'); td.style.cssText='padding:8px 12px;vertical-align:middle;text-align:right;white-space:nowrap';
        if(isE) {
          var inp=document.createElement('input'); inp.type='number'; inp.value=editRowData[key]||'';
          inp.style.cssText='width:80px;background:#0d1020;border:1px solid #4f8ef7;border-radius:5px;padding:3px 6px;color:'+color+';font-size:12px;outline:none;text-align:right;box-sizing:border-box';
          (function(k){ inp.oninput=function(){editRowData[k]=inp.value;}; })(key);
          inp.onclick=function(e){e.stopPropagation();};
          td.appendChild(inp);
        } else { td.style.color=color; td.style.fontFamily='monospace'; td.textContent=fmt(item[key])+'원'; }
        tr.appendChild(td);
      }
      addTd('id','#4f8ef7','font-family:monospace;font-size:11px;white-space:nowrap');
      addTd('name','#e8eaf0','font-weight:600;white-space:'+(isE?'normal':'nowrap'));
      addTd('spec','#9ca3af','min-width:90px;font-size:12px');
      addTd('supplier','#93c5fd','white-space:'+(isE?'normal':'nowrap'));
      addNumTd('purchasePrice','#34d399');
      addNumTd('supplyPrice','#f87171');
      addTd('manufacturer','#c4b5fd','white-space:'+(isE?'normal':'nowrap'));
      addTd('note','#6b7280','min-width:80px;font-size:12px');
      var tdM=document.createElement('td'); tdM.style.cssText='padding:8px 10px;vertical-align:middle;white-space:nowrap';
      var bd=document.createElement('div'); bd.style.cssText='display:flex;gap:4px';
      if(isE) {
        var bs=document.createElement('button'); bs.textContent='✓ 저장';
        bs.style.cssText='background:linear-gradient(135deg,#166534,#15803d);border:none;border-radius:6px;padding:5px 9px;color:#fff;font-size:11px;font-weight:700;cursor:pointer';
        (function(id){ bs.onclick=function(e){e.stopPropagation();saveRow(id);}; })(item.id);
        var bc=document.createElement('button'); bc.textContent='✕';
        bc.style.cssText='background:transparent;border:1px solid #374151;border-radius:6px;padding:5px 7px;color:#9ca3af;font-size:11px;cursor:pointer';
        bc.onclick=function(e){e.stopPropagation();cancelRow();};
        bd.appendChild(bs); bd.appendChild(bc);
      } else {
        var be=document.createElement('button'); be.textContent='✏ 수정';
        be.style.cssText='background:transparent;border:1px solid #1e3a5f;border-radius:6px;padding:4px 8px;color:#60a5fa;font-size:11px;cursor:pointer';
        (function(id){ be.onclick=function(e){e.stopPropagation();startRow(id);}; })(item.id);
        var bdl=document.createElement('button'); bdl.textContent='삭제';
        bdl.style.cssText='background:transparent;border:1px solid #3f2020;border-radius:6px;padding:4px 8px;color:#f87171;font-size:11px;cursor:pointer';
        (function(id){ bdl.onclick=function(e){e.stopPropagation();doDeleteById(id);}; })(item.id);
        bd.appendChild(be); bd.appendChild(bdl);
      }
      tdM.appendChild(bd); tr.appendChild(tdM);
      tbody.appendChild(tr);
    })(results[ri]);
  }
  table.appendChild(tbody); scrollDiv.appendChild(table); wrap.appendChild(scrollDiv);
  area.innerHTML = ''; area.appendChild(wrap);
}

function startRow(id) { editRowId=id; editRowData=JSON.parse(JSON.stringify(items.filter(function(i){return i.id===id;})[0]||{})); renderTable(); }
function cancelRow() { editRowId=null; editRowData={}; renderTable(); }
function saveRow(id) {
  var updated = JSON.parse(JSON.stringify(editRowData));
  updated.purchasePrice = toNum(updated.purchasePrice);
  updated.supplyPrice = toNum(updated.supplyPrice);
  for(var i=0;i<items.length;i++) { if(items[i].id===id){items[i]=updated;break;} }
  if(results) { for(var j=0;j<results.length;j++) { if(results[j].id===id){results[j]=updated;break;} } }
  if(curItem&&curItem.id===id) curItem=updated;
  editRowId=null; editRowData={};
  renderTable(); setBadge('ing');
  gasPost({action:'update',item:updated},function(){setBadge('ok');});
}

function doDeleteById(id) {
  if(!confirm('이 물품을 삭제하시겠습니까?')) return;
  var newItems=[]; for(var i=0;i<items.length;i++) { if(items[i].id!==id) newItems.push(items[i]); } items=newItems;
  if(results) { var nr=[]; for(var j=0;j<results.length;j++) { if(results[j].id!==id) nr.push(results[j]); } results=nr; }
  if(curItem&&curItem.id===id) closeDetail();
  $('total-cnt').textContent=items.length;
  renderTable(); setBadge('ing');
  gasPost({action:'delete',id:id},function(){setBadge('ok');});
}
function doDelete() { if(curItem) doDeleteById(curItem.id); }

function openDetail(id) {
  for(var i=0;i<items.length;i++) { if(items[i].id===id){curItem=items[i];break;} }
  if(!curItem) return;
  detEditing=false;
  $('det-edit-btn').style.display='inline-block';
  $('det-save-btn').style.display='none';
  var bc=$('det-bot-card'); if(bc) bc.style.display='none';
  var nc=$('det-note-card'); if(nc) nc.style.display='none';
  fillDetail(curItem);
  $('detail').style.display='block';
  window.scrollTo(0,0);
}

function fillDetail(item) {
  $('d-id').textContent=item.id||'—';
  $('d-supplier').textContent=item.supplier||'—';
  $('d-name').textContent=item.name||'—';
  $('d-spec').textContent=item.spec||'—';
  $('d-note').textContent=item.note||'—';
  $('d-purchase').textContent=fmt(item.purchasePrice)+'원';
  $('d-supply').textContent=fmt(item.supplyPrice)+'원';
  $('d-manufacturer').textContent=item.manufacturer||'—';
  var margin=item.purchasePrice>0?(((item.supplyPrice-item.purchasePrice)/item.supplyPrice)*100).toFixed(1):'—';
  $('d-margin').textContent=margin+'%';
  var pi=$('det-photo-inner');
  if(item.photo) pi.innerHTML='<img src="'+item.photo+'" style="width:200px;height:200px;object-fit:cover">';
  else pi.innerHTML='<div style="font-size:36px;margin-bottom:8px">📷</div><div style="font-size:12px;color:#4b5563">클릭하여 사진 추가</div>';
  var pw=$('d-phone-wrap'), mw=$('d-mobile-wrap');
  pw.innerHTML=item.phone?'<a href="tel:'+item.phone+'" style="display:block;background:#0f1a0f;border-radius:10px;padding:11px 13px;border:1px solid #166534;text-decoration:none"><div class="lbl">📞 회사번호</div><div style="font-size:13px;font-weight:700;color:#4ade80">'+item.phone+'</div><div style="font-size:9px;color:#4ade80;margin-top:2px">터치하여 전화</div></a>':'<div class="cell"><div class="lbl">📞 회사번호</div><div style="font-size:13px;color:#4b5563">—</div></div>';
  mw.innerHTML=item.mobile?'<a href="tel:'+item.mobile+'" style="display:block;background:#0f1a0f;border-radius:10px;padding:11px 13px;border:1px solid #166534;text-decoration:none"><div class="lbl">📱 휴대폰</div><div style="font-size:13px;font-weight:700;color:#4ade80">'+item.mobile+'</div><div style="font-size:9px;color:#4ade80;margin-top:2px">터치하여 전화</div></a>':'<div class="cell"><div class="lbl">📱 휴대폰</div><div style="font-size:13px;color:#4b5563">—</div></div>';
}

function closeDetail() { $('detail').style.display='none'; detEditing=false; curItem=null; }

function toggleBotCard() {
  var botCard=$('det-bot-card');
  var noteCard=$('det-note-card');
  var show=(botCard&&botCard.style.display==='none')?'block':'none';
  if(botCard) botCard.style.display=show;
  if(noteCard) noteCard.style.display=show;
}

function startDetailEdit() {
  if(!curItem) return;
  detEditing=true;
  $('det-edit-btn').style.display='none';
  $('det-save-btn').style.display='inline-block';
  var S='width:100%;background:#0d1020;border:1px solid #4f8ef7;border-radius:6px;padding:5px 8px;font-size:13px;outline:none;box-sizing:border-box;color:';
  $('d-id').innerHTML='<input id="di-id" class="einp" value="'+esc(curItem.id)+'" style="color:#4f8ef7">';
  $('d-supplier').innerHTML='<input id="di-supplier" class="einp" value="'+esc(curItem.supplier)+'" style="color:#93c5fd">';
  $('d-name').innerHTML='<input id="di-name" class="einp" value="'+esc(curItem.name)+'" style="color:#e8eaf0">';
  $('d-spec').innerHTML='<input id="di-spec" class="einp" value="'+esc(curItem.spec)+'" style="color:#e8eaf0">';
  $('d-note').innerHTML='<input id="di-note" class="einp" value="'+esc(curItem.note)+'" style="color:#9ca3af">';
  $('d-manufacturer').innerHTML='<input id="di-manufacturer" class="einp" value="'+esc(curItem.manufacturer)+'" style="color:#c4b5fd">';
  $('d-purchase').innerHTML='<input id="di-purchase" class="einp" type="number" value="'+curItem.purchasePrice+'" style="color:#34d399">';
  $('d-supply').innerHTML='<input id="di-supply" class="einp" type="number" value="'+curItem.supplyPrice+'" style="color:#f87171">';
  $('d-phone-wrap').innerHTML='<div class="cell"><div class="lbl">📞 회사번호</div><input id="di-phone" class="einp" type="tel" value="'+esc(curItem.phone)+'" style="color:#4ade80"></div>';
  $('d-mobile-wrap').innerHTML='<div class="cell"><div class="lbl">📱 휴대폰</div><input id="di-mobile" class="einp" type="tel" value="'+esc(curItem.mobile)+'" style="color:#4ade80"></div>';
  var bc=$('det-bot-card'); if(bc) bc.style.display='block';
  var nc=$('det-note-card'); if(nc) nc.style.display='block';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function gv(id) { var el=$(id); return el?el.value:''; }

function saveDetail() {
  var updated={
    id:gv('di-id')||curItem.id, name:gv('di-name'), spec:gv('di-spec'),
    supplier:gv('di-supplier'), manufacturer:gv('di-manufacturer'), note:gv('di-note'),
    purchasePrice:toNum(gv('di-purchase')), supplyPrice:toNum(gv('di-supply')),
    phone:gv('di-phone'), mobile:gv('di-mobile'), photo:curItem.photo
  };
  for(var i=0;i<items.length;i++) { if(items[i].id===curItem.id){items[i]=updated;break;} }
  if(results) { for(var j=0;j<results.length;j++) { if(results[j].id===curItem.id){results[j]=updated;break;} } }
  curItem=updated; detEditing=false;
  $('det-edit-btn').style.display='inline-block';
  $('det-save-btn').style.display='none';
  fillDetail(updated); renderTable(); setBadge('ing');
  gasPost({action:'update',item:updated},function(){setBadge('ok');});
}

function processDetPhotoFile(file) {
  if(!file || file.type.indexOf('image')!==0) return;
  var r=new FileReader();
  r.onload=function(ev) {
    $('det-photo-inner').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#60a5fa"><div style="font-size:24px;margin-bottom:8px">⬆️</div><div style="font-size:11px">업로드 중...</div></div>';
    uploadPhoto(ev.target.result, file.type, 'item_'+(curItem?curItem.id:'x')+'_'+Date.now()+'.jpg', function(err, url) {
      if(err) {
        $('det-photo-inner').innerHTML='<div style="color:#f87171;font-size:12px;padding:10px;text-align:center">업로드 실패.<br>다시 시도해주세요.</div>';
        return;
      }
      if(curItem) {
        curItem.photo=url;
        for(var i=0;i<items.length;i++) { if(items[i].id===curItem.id){items[i].photo=url;break;} }
        $('det-photo-inner').innerHTML='<img src="'+url+'" style="width:200px;height:200px;object-fit:cover">';
        setBadge('ing');
        gasPost({action:'update',item:curItem},function(){setBadge('ok');});
      }
    });
  };
  r.readAsDataURL(file);
}
function handleDetPhoto(e) {
  var file=e.target.files[0]; if(!file) return;
  processDetPhotoFile(file);
}
function handleDetPhotoDrop(e) {
  e.preventDefault();
  var dt=e.dataTransfer;
  var file = dt && dt.files && dt.files[0];
  if(file) processDetPhotoFile(file);
  var lbl=e.currentTarget; lbl.style.borderColor='#2a2d3e'; lbl.style.background='#0f1117';
}
function handleDetPhotoDragOver(e) {
  e.preventDefault();
  var lbl=e.currentTarget; lbl.style.borderColor='#4f8ef7'; lbl.style.background='#16203a';
}
function handleDetPhotoDragLeave(e) {
  var lbl=e.currentTarget; lbl.style.borderColor='#2a2d3e'; lbl.style.background='#0f1117';
}

function showAdd() { $('add-bg').style.display='flex'; newPhoto=null; }
function closeAdd() {
  $('add-bg').style.display='none'; newPhoto=null;
  var ids=['ni-id','ni-name','ni-spec','ni-manufacturer','ni-supplier','ni-note','ni-purchase','ni-supply','ni-phone','ni-mobile'];
  for(var i=0;i<ids.length;i++) { var el=$(ids[i]); if(el) el.value=''; }
  $('add-photo-prev').innerHTML='<div style="font-size:24px;margin-bottom:5px">📷</div><div style="font-size:12px">터치 또는 끌어다 놓기</div>';
}

function processAddPhotoFile(file) {
  if(!file || file.type.indexOf('image')!==0) return;
  var r=new FileReader();
  r.onload=function(ev) {
    $('add-photo-prev').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:110px;color:#60a5fa"><div style="font-size:22px;margin-bottom:6px">⬆️</div><div style="font-size:11px">업로드 중...</div></div>';
    newPhoto='uploading';
    uploadPhoto(ev.target.result, file.type, 'new_'+Date.now()+'.jpg', function(err, url) {
      if(err) {
        $('add-photo-prev').innerHTML='<div style="color:#f87171;font-size:12px;padding:10px;text-align:center">업로드 실패.<br>다시 시도해주세요.</div>';
        newPhoto=null; return;
      }
      newPhoto=url;
      $('add-photo-prev').innerHTML='<img src="'+url+'" style="width:100%;height:110px;object-fit:cover">';
    });
  };
  r.readAsDataURL(file);
}
function handleAddPhoto(e) {
  var file=e.target.files[0]; if(!file) return;
  processAddPhotoFile(file);
}
function handleAddPhotoDrop(e) {
  e.preventDefault();
  var dt=e.dataTransfer;
  var file = dt && dt.files && dt.files[0];
  if(file) processAddPhotoFile(file);
  var lbl=e.currentTarget; lbl.style.borderColor='#2a2d3e'; lbl.style.background='#0f1117';
}
function handleAddPhotoDragOver(e) {
  e.preventDefault();
  var lbl=e.currentTarget; lbl.style.borderColor='#4f8ef7'; lbl.style.background='#16203a';
}
function handleAddPhotoDragLeave(e) {
  var lbl=e.currentTarget; lbl.style.borderColor='#2a2d3e'; lbl.style.background='#0f1117';
}

function submitAdd() {
  var id=($('ni-id').value||'').trim(), name=($('ni-name').value||'').trim();
  if(!id||!name) { alert('물품번호와 품명은 필수입니다.'); return; }
  if(newPhoto==='uploading') { alert('사진 업로드 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  var ph=($('ni-phone').value||'').trim(), mb=($('ni-mobile').value||'').trim();
  var item={
    id:id, name:name, spec:$('ni-spec').value, manufacturer:$('ni-manufacturer').value,
    supplier:$('ni-supplier').value, note:$('ni-note').value,
    purchasePrice:toNum($('ni-purchase').value), supplyPrice:toNum($('ni-supply').value),
    phone:ph?' '+ph:'', mobile:mb?' '+mb:'', photo:newPhoto||''
  };
  items.push(item); $('total-cnt').textContent=items.length;
  closeAdd(); setBadge('ing');
  gasPost({action:'add',item:item},function(){setBadge('ok');});
}

function doExport(searchOnly) {
  var data=(searchOnly&&results)?results:items;
  var rows=[];
  for(var i=0;i<data.length;i++) {
    var it=data[i];
    rows.push({
      '물품번호':it.id,'품명':it.name,'규격':it.spec,
      '입고단가(원)':it.purchasePrice,'납품단가(원)':it.supplyPrice,
      '마진율(%)':it.purchasePrice>0?Number(((it.supplyPrice-it.purchasePrice)/it.supplyPrice*100).toFixed(1)):'',
      '제작회사':it.manufacturer,'납품처':it.supplier,
      '회사번호':it.phone,'휴대폰':it.mobile,'비고':it.note,'사진링크':it.photo||''
    });
  }
  var ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:20},{wch:20},{wch:12},{wch:12},{wch:10},{wch:16},{wch:16},{wch:14},{wch:14},{wch:20},{wch:40}];
  var wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'물품목록');
  XLSX.writeFile(wb,'물품목록_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.xlsx');
}

loadData(false);
setInterval(function(){loadData(true);},30000);
</script>
